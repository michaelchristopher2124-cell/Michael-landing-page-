<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>Michael Christopher | AI-Powered Web Developer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --gold: #d4a017;
    --gold-light: #e8b83a;
    --navy: #0a192f;
    --navy-light: #112240;
    --red: #c0392b;
    --white: #ffffff;
    --gray: #a0a4c0;
  }

  body {
    margin: 0;
    background: var(--navy);
    color: var(--white);
    font-family: 'Montserrat', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    align-items: center;
    justify-content: center;
    overflow-x: hidden;
  }

  /* Background */
  .bg {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 0%, rgba(212,160,23,0.08) 0%, transparent 60%),
      radial-gradient(ellipse at 100% 100%, rgba(212,160,23,0.04) 0%, transparent 50%),
      var(--navy);
    z-index: 0;
  }

  /* Grain texture */
  .bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
    opacity: 0.5;
  }

  .wrapper {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    width: 100%;
    max-width: 480px;
    padding: 40px 24px;
  }

  /* Top label */
  .brand-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 5px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 6px;
  }

  /* Logo */
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 38px;
    font-weight: 300;
    letter-spacing: 6px;
    color: #fff;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .logo span {
    color: var(--gold);
  }

  .logo-sub {
    font-family: 'Cormorant Garamond', serif;
    font-size: 12px;
    font-style: italic;
    color: rgba(255,255,255,0.45);
    letter-spacing: 3px;
    margin-bottom: 48px;
  }

  /* Orb */
  .orb-wrap {
    position: relative;
    width: 160px;
    height: 160px;
    margin-bottom: 40px;
  }

  .orb-ring {
    position: absolute;
    inset: 0;
    border-radius: 50%;
    border: 1px solid rgba(212,160,23,0.25);
    animation: ring-pulse 3s ease-in-out infinite;
  }

  .orb-ring-2 {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    border: 1px solid rgba(212,160,23,0.1);
    animation: ring-pulse 3s ease-in-out infinite 0.5s;
  }

  .orb-ring-3 {
    position: absolute;
    inset: -30px;
    border-radius: 50%;
    border: 1px solid rgba(212,160,23,0.05);
    animation: ring-pulse 3s ease-in-out infinite 1s;
  }

  @keyframes ring-pulse {
    0%, 100% { opacity: 0.6; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.03); }
  }

  .orb {
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #112240, #0a192f);
    border: 1px solid rgba(212,160,23,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 52px;
    box-shadow: 0 0 60px rgba(212,160,23,0.08), inset 0 0 30px rgba(0,0,0,0.5);
    transition: all 0.4s ease;
  }

  .orb.speaking {
    box-shadow: 0 0 80px rgba(212,160,23,0.25), inset 0 0 30px rgba(0,0,0,0.5);
    animation: orb-speak 0.6s ease-in-out infinite alternate;
  }

  .orb.listening {
    box-shadow: 0 0 80px rgba(212,160,23,0.3), inset 0 0 30px rgba(0,0,0,0.5);
    border-color: rgba(212,160,23,0.5);
  }

  @keyframes orb-speak {
    from { transform: scale(1); }
    to { transform: scale(1.04); }
  }

  /* Status */
  .status {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 32px;
    min-height: 16px;
    transition: all 0.3s;
  }

  /* Transcript bubble */
  .transcript-box {
    width: 100%;
    min-height: 64px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(212,160,23,0.15);
    border-radius: 2px;
    padding: 16px 20px;
    margin-bottom: 32px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 17px;
    font-style: italic;
    color: rgba(255,255,255,0.7);
    line-height: 1.6;
    text-align: center;
    min-height: 80px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.4s;
  }

  /* Mic button */
  .mic-btn {
    width: 76px;
    height: 76px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #d4a017, #b8860b);
    color: #0a192f;
    border: none;
    font-size: 28px;
    cursor: pointer;
    transition: all 0.3s;
    box-shadow: 0 4px 30px rgba(212,160,23,0.4);
    position: relative;
    outline: none;
  }

  .mic-btn::after {
    content: '';
    position: absolute;
    inset: -4px;
    border-radius: 50%;
    border: 1px solid rgba(212,160,23,0.3);
  }

  .mic-btn:hover {
    transform: scale(1.05);
    box-shadow: 0 6px 40px rgba(212,160,23,0.6);
  }

  .mic-btn:active { transform: scale(0.95); }

  .mic-btn.active {
    background: radial-gradient(circle at 35% 35%, #e8b83a, #d4a017);
    animation: mic-pulse 1s infinite;
  }

  @keyframes mic-pulse {
    0%, 100% { box-shadow: 0 0 0 0 rgba(212,160,23,0.6); }
    50% { box-shadow: 0 0 0 16px rgba(212,160,23,0); }
  }

  .mic-label {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.25);
    margin-top: 12px;
  }

  /* Conversation history */
  .history {
    width: 100%;
    margin-top: 24px;
    max-height: 180px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
    scrollbar-width: none;
  }

  .history::-webkit-scrollbar { display: none; }

  .msg {
    padding: 10px 14px;
    border-radius: 2px;
    font-size: 12px;
    line-height: 1.5;
    font-family: 'Montserrat', sans-serif;
    max-width: 90%;
  }

  .msg.user {
    background: rgba(255,255,255,0.05);
    border-left: 2px solid rgba(255,255,255,0.2);
    align-self: flex-end;
    color: rgba(255,255,255,0.65);
    text-align: right;
  }

  .msg.ai {
    background: rgba(212,160,23,0.06);
    border-left: 2px solid var(--gold);
    align-self: flex-start;
    color: rgba(255,255,255,0.75);
  }

  /* Buttons */
  .action-buttons {
    display: flex;
    gap: 15px;
    margin-top: 20px;
  }

  .btn-secondary {
    background: transparent;
    border: 1px solid rgba(212,160,23,0.3);
    color: var(--gold);
    padding: 10px 20px;
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.3s;
    border-radius: 30px;
    text-decoration: none;
    display: inline-block;
  }

  .btn-secondary:hover {
    background: rgba(212,160,23,0.1);
    border-color: var(--gold);
  }

  /* Gold divider */
  .divider {
    width: 60px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 28px auto 0;
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="wrapper">
  <div class="brand-label">✦ AI-Powered Web Development ✦</div>
  <div class="logo">Michael <span>Christopher</span></div>
  <div class="logo-sub">AI Assistant — Ask Me Anything</div>

  <div class="orb-wrap">
    <div class="orb-ring-3"></div>
    <div class="orb-ring-2"></div>
    <div class="orb-ring"></div>
    <div class="orb" id="orb">💻</div>
  </div>

  <div class="status" id="status">Initializing...</div>

  <div class="transcript-box" id="transcript">
    <em>Your AI assistant is ready. Ask me anything — about websites, general knowledge, or just chat.</em>
  </div>

  <button class="mic-btn" id="mic-btn" onclick="startListening()">🎤</button>
  <div class="mic-label">Tap to speak</div>

  <div class="history" id="history"></div>

  <div class="action-buttons">
    <a href="#contact" class="btn-secondary">📧 Contact Me</a>
    <a href="#portfolio" class="btn-secondary">📁 View Portfolio</a>
  </div>

  <div class="divider"></div>
</div>

<script>
  const orb = document.getElementById('orb');
  const statusEl = document.getElementById('status');
  const transcriptEl = document.getElementById('transcript');
  const micBtn = document.getElementById('mic-btn');
  const historyEl = document.getElementById('history');

  let conversationHistory = [];
  let isSpeaking = false;
  let isListening = false;

  // Your Gemini API Key
  const GEMINI_API_KEY = "AIzaSyD-ETicHVA4iLy1epQ2ipOddhjWKAV8l_g";

  // UPDATED: This AI can answer ANY question
  const SYSTEM_PROMPT = `You are Michael Christopher's friendly AI assistant. You can answer ANY question the user asks.
  
  IMPORTANT BUSINESS INFO about Michael Christopher (use this when asked about web development):
  - Michael is a web developer based in Nigeria
  - Services: Restaurant websites, Beauty salon websites, E-commerce stores
  - Pricing: Standard ₦50,000, Premium ₦80,000, E-commerce ₦120,000 (one-time payment)
  - Includes: WhatsApp integration, mobile responsive, manager dashboard, QR code
  - Delivery: 3-7 days, 50% deposit required to start
  - Portfolio: Nee Scent (perfumes), Kingzway Eatery (restaurant), Luxury Nail NG (beauty)
  - Contact: WhatsApp 0803 295 8122, call 0811 240 1459, email michaelchristopher2124@gmail.com
  
  For ANY OTHER QUESTION (general knowledge, trivia, advice, facts), answer helpfully and conversationally.
  Be friendly, warm, and professional. Keep responses concise (2-3 sentences for simple questions, longer if needed).
  You can answer questions about anything: science, history, technology, jokes, recommendations, etc.`;

  // Greeting on load
  window.onload = () => {
    setTimeout(() => {
      const greeting = "Hello! I'm Michael's AI assistant. Ask me anything — about websites, general knowledge, or just have a conversation. What would you like to know?";
      setStatus("Ready");
      speak(greeting);
      showTranscript(greeting);
      addToHistory('ai', greeting);
    }, 1200);
  };

  function setStatus(text) {
    statusEl.innerText = text;
  }

  function showTranscript(text) {
    transcriptEl.innerHTML = `<em>${text}</em>`;
  }

  function addToHistory(role, text) {
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    div.textContent = text;
    historyEl.appendChild(div);
    historyEl.scrollTop = historyEl.scrollHeight;
  }

  // AI Reply using Gemini - Now answers ANY question
  async function getAIReply(userText) {
    const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_API_KEY}`;
    
    // No restriction - answers everything
    const prompt = `${SYSTEM_PROMPT}\n\nUser: ${userText}\nAssistant:`;
    
    try {
      const response = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }]
        })
      });
      const data = await response.json();
      if (data.candidates && data.candidates[0]) {
        return data.candidates[0].content.parts[0].text;
      } else {
        return "I'm having a moment. Please try again or WhatsApp Michael at 0803 295 8122.";
      }
    } catch (e) {
      console.error('API Error:', e);
      return "Connection issue. Please try again in a moment.";
    }
  }

  // Speech Recognition
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  let recognition;

  if (SpeechRecognition) {
    recognition = new SpeechRecognition();
    recognition.lang = 'en-US';
    recognition.interimResults = false;
    recognition.maxAlternatives = 1;

    recognition.onresult = async (event) => {
      const userText = event.results[0][0].transcript;
      isListening = false;
      micBtn.classList.remove('active');
      orb.classList.remove('listening');

      showTranscript(userText);
      addToHistory('user', userText);
      setStatus("Thinking...");

      const reply = await getAIReply(userText);
      addToHistory('ai', reply);
      speak(reply);
    };

    recognition.onerror = (e) => {
      console.error('Speech error:', e.error);
      isListening = false;
      micBtn.classList.remove('active');
      orb.classList.remove('listening');
      setStatus("Ready");
      showTranscript("I didn't catch that. Please try again.");
    };

    recognition.onend = () => {
      if (isListening) {
        isListening = false;
        micBtn.classList.remove('active');
        orb.classList.remove('listening');
        setStatus("Ready");
      }
    };
  } else {
    console.warn('Speech recognition not supported');
  }

  function startListening() {
    if (isSpeaking) { 
      window.speechSynthesis.cancel(); 
      isSpeaking = false; 
    }
    if (!recognition) {
      showTranscript("Voice recognition not supported in this browser. Try Chrome on Android.");
      return;
    }
    isListening = true;
    micBtn.classList.add('active');
    orb.classList.add('listening');
    orb.classList.remove('speaking');
    setStatus("Listening...");
    recognition.start();
  }

  // Text to Speech
  function speak(text) {
    window.speechSynthesis.cancel();
    const utterance = new SpeechSynthesisUtterance(text);
    
    const voices = window.speechSynthesis.getVoices();
    const preferred = voices.find(v => 
      v.name.includes('Google UK') || 
      v.name.includes('Samantha') || 
      v.name.includes('Alex')
    );
    if (preferred) utterance.voice = preferred;
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = 1;

    utterance.onstart = () => {
      isSpeaking = true;
      orb.classList.add('speaking');
      orb.classList.remove('listening');
      setStatus("Speaking...");
    };

    utterance.onend = () => {
      isSpeaking = false;
      orb.classList.remove('speaking');
      setStatus("Ready");
    };

    window.speechSynthesis.speak(utterance);
  }

  // Load voices
  window.speechSynthesis.onvoiceschanged = () => { 
    window.speechSynthesis.getVoices(); 
  };

  // Smooth scroll for anchor links
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function(e) {
      e.preventDefault();
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        target.scrollIntoView({ behavior: 'smooth' });
      }
    });
  });
</script>
</body>
</html>
